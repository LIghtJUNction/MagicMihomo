  - AND,((NETWORK,UDP),(DST-PORT,123)),DIRECT
  - AND,((NETWORK,TCP),(DST-PORT,5228-5230)),DIRECT # Google Push
  - AND,((NETWORK,UDP),(DST-PORT,135-139)),DIRECT # NetBIOS
