dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true # 开启 IPv6 解析
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fake-ip-range-v6: fc00::/18 # IPv6 Fake-IP，Android 环境下视网络情况开启
  cache-algorithm: arc
  prefer-h3: true
  # 必须排除 Tailscale 域名，否则 MagicDNS 无法与 WireGuard 节点正确握手
  fake-ip-filter:
    - "+.tailscale.net"
    - "+.ts.net"
    - "+.lan"
    - "+.local"
    - "+.home.arpa"
    - "*.arpa"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "ntp.*.com"
    - "geosite:private"

  default-nameserver:
    - 223.5.5.5
    - 2401:3200::1
    - 1.1.1.1
    - 2606:4700:4700::1111

  nameserver:
    - dns.google # 推荐使用 DoH 以获得更好的 H3 支持
    - cloudflare-dns.com
    - quic://dns.adguard-dns.com

  nameserver-policy:
    # 2. 国内核心域名：确保 CDN 加速，合并加速
    "geosite:cn,apple-cn,microsoft-cn,google-cn,games-cn":
      - 223.5.5.5
      - 2401:3200::1
      - doh.pub

    # 3. 局域网与私有域名：直接返回真实 IP
    "geosite:private":
      - 223.5.5.5
      - 2401:3200::1
    "+.local,+.home.arpa":
      - 223.5.5.5
      - 2401:3200::1

    # 4. 代理与 AI 类：强制走海外加密协议
    "geosite:proxy,ai,gfw,tld-proxy":
      - dns.google
      - cloudflare-dns.com
      - quic://dns.adguard-dns.com

    # 5. 影音媒体与游戏：优化延迟
    "geosite:media,games":
      - dns.google
      - 1.1.1.1

    # 6. 网络连通性测试：返回真实解析，避免误判
    "geosite:networktest":
      - 223.5.5.5
      - 119.29.29.29

    # 7. 广告与追踪器
    "geosite:ads,trackerslist":
      - rcode://refused
tun:
  enable: true
  stack: mixed # 推荐使用 mixed 或 gvisor，性能优于 system
  device: utun
  mtu: 1500 # 标准值
  auto-route: true # 自动路由
  auto-detect-interface: true # 自动选择主出口网卡
  strict-route: true # 开启后可防止流量绕过代理
  endpoint-independent-nat: true # 开启独立于端点的 NAT (锥形 NAT)，对游戏/P2P 非常友好
  dns-hijack:
    - "any:53" # 劫持所有 IPv4 UDP/53 流量
    - "tcp://any:53" # 劫持所有 IPv4 TCP/53 流量
    - "[::]:53" # 劫持所有 IPv6 UDP/53 流量
    - "tcp://[::]:53" # 劫持所有 IPv6 TCP/53 流量

  inet4-route-exclude-address:
    - 192.168.0.0/16 # 标准局域网段
    - 10.0.0.0/8 # 企业级/大型局域网段
    - 172.16.0.0/12 # 中型局域网段
    - 100.64.0.0/10 # 运营商级 NAT (CGNAT) 及 Tailscale 默认网段
    - 127.0.0.0/8 # 本地回环地址
    - 169.254.0.0/16 # 链路本地地址 (APIPA)
    - 224.0.0.0/4 # 组播地址 (用于投屏和设备发现)

  inet6-route-exclude-address:
    - ::1/128 # IPv6 本地回环地址
    - fc00::/7 # 唯一本地地址 (ULA) - 相当于 IPv4 私有网段
    - fe80::/10 # 链路本地地址 (Link-Local) - 关键：用于邻居发现 (NDP)
    - ff00::/8 # 组播地址 (Multicast) - 投屏、路由发现必需
    - fd7a:115c:a1e0::/48 # Tailscale 专属 IPv6 固定前缀 (强烈建议添加)
  exclude-package:
    - com.tailscale.ipn # Tailscale
    - com.wireguard.android # WireGuard
    - net.openvpn.openvpn # OpenVPN Connect
    - de.blinkt.openvpn # OpenVPN for Android
    - com.zerotier.one # ZeroTier One
    - com.cloudflare.onedotonedotonedotone # Cloudflare WARP
    - io.nekohasekai.sfa # sing-box for Android
    - moe.nb4a # NekoBox for Android
    - com.v2ray.ang # v2rayNG
    - com.github.kr328.clash # Clash for Android
    - com.github.metacubex.clash.meta # Clash Meta for Android
sniffer:
  enable: true
  parse-pure-ip: true # 建议开启：处理纯 IP 流量时尝试还原域名
  force-dns-mapping: true # 建议开启：配合 fake-ip 提高域名还原准确率
  override-destination: true # 全局覆盖目标地址
  sniff:
    TLS: # TLS 嗅探 (HTTPS)
      ports: [443, 8443, 2096, 2087] # 拓展 Cloudflare 常用端口
    HTTP: # HTTP 嗅探
      ports: [80, 8080-8880]
      override-destination: true # HTTP 强制覆盖
    QUIC: # QUIC 嗅探 (针对 YouTube/Google 优化)
      ports: [443, 8443] # QUIC (HTTP/3) 嗅探，針對 YouTube/Google 最佳化
  force-domain:
    - "google.com" # 確保 Google 相關服務不走純 IP
    - "netflix.com" # 影視類強制還原，防止 CDN 鎖區失效
  skip-domain:
    - "Mijia Cloud" # 米家等 IoT 設備使用私有協議，嗅探會斷連
    - "geosite:private" # 私有網絡不嗅探
    - "geosite:apple-cn" # Apple 服務對 SNI 篡改極其敏感，跳過以保證穩定性
    - "geosite:microsoft-cn" # 解決 Office365 登錄緩慢
    - "+.lan"
    - "+.local"
    - "+.home.arpa"
    - "+.tailscale.net"
    - "+.ts.net"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "+.push.apple.com" # 蘋果推送專用
    - "+.apple.com"
    - "+.icloud.com"
    - "+.itunes.apple.com"
    - "Pairing" # 藍牙/隔空投送相關
    - "Directory" # 系統目錄服務
profile:
  store-selected: true
  store-fake-ip: true
ntp:
  enable: true
  write-to-system: false # 除非是作为路由器固件运行，否则建议保持 false
